name: Setup Gradle
description: Setup Gradle environment and JDK for GitHub Actions
inputs:
  java-version:
    description: 'The version of Java to set up (e.g., "21", "17", "11").'
    required: true
    default: '21'
  java-distribution:
    description: 'The Java distribution to use (e.g., "temurin", "zulu").'
    required: false
    default: 'temurin'
  gradle-version:
    description: 'The version of Gradle to set up (e.g., "7.5", "wrapper").'
    required: false
    default: 'wrapper'
  cache-read-only:
    description: 'Whether to set Gradle cache to read-only mode.'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up swap space
      if: runner.os == 'Linux'
      uses: pierotofy/set-swap-space@49819abfb41bd9b44fb781159c033dba90353a7c # v1.0
      with:
        swap-size-gb: 10

    - name: Setup JDK
      uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}

    - name: Validate Gradle wrapper
      if: ${{ inputs.gradle-version == 'wrapper' }}
      uses: gradle/actions/wrapper-validation@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5
      with:
        gradle-version: ${{ inputs.gradle-version }}
        cache-read-only: ${{ inputs.cache-read-only }}
